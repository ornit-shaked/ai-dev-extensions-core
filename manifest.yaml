# AI Dev Extensions Core - Manifest
# This file defines the extension metadata and IDE mappings
#
# PURPOSE:
#   - Package-level metadata and configuration
#   - Defines which domains are available and their load order
#   - Specifies IDE compatibility and features
#   - Used by setup scripts to configure microservice projects
#
# WHO USES IT:
#   - Setup scripts (setup-microservice.ps1) - reads domain configuration
#   - Package maintainers - update when adding/removing domains
#   - Microservice developers - can override via .dev-extensions.config.yaml
#   - IDEs - may read metadata in future for automatic discovery
#
# WHEN TO EDIT:
#   - Adding a new domain → update 'domains' section
#   - Changing IDE support → update 'compatibility' section
#   - Package version bump → update 'version'

extension:
  name: "ai-dev-extensions-core"
  version: "0.1.0"
  description: "Reusable AI development workflows, templates, and rules for multiple IDEs"
  author: "Ornit Shaked"
  license: "MIT"
  
  # Repository information
  repository:
    type: "git"
    url: "https://github.com/ornit-shaked/ai-dev-extensions-core"
    bitbucket: "https://ilptltvbbp01.ecitele.com:8443/scm/~oshaked/ai-dev-extensions-core.git"
  
  # IDE mapping configuration
  # See config/ide-mapping.yaml for detailed IDE-specific mappings
  ide_config: "config/ide-mapping.yaml"
  
  # Minimum IDE versions (when applicable)
  compatibility:
    windsurf:
      min_version: "1.0.0"
      supported: true
      features: ["workflows", "rules", "skills"]
    cursor:
      min_version: "0.1.0"
      supported: true
      features: ["workflows", "rules"]
    vscode:
      supported: false  # Planned
    intellij:
      supported: false  # Requires plugin detection

# Domain configuration
domains:
  _core:
    enabled_by_default: true
    description: "Shared rules, skills, and utilities"
    priority: 0  # Loaded first
    
  architecture:
    enabled_by_default: true
    description: "Architecture documentation and intake workflows"
    priority: 1

# IDE-specific mappings
# Detailed mappings are defined in config/ide-mapping.yaml
# The setup script reads that file to determine target directories
# and content type mappings for each supported IDE.
#
# To add support for a new IDE, update config/ide-mapping.yaml
# and the setup script will automatically handle it.

# Feature flags (for future use)
features:
  skills_support: false      # Phase 2
  dynamic_loading: false     # Phase 2
  auto_updates: false        # Phase 3
  mcp_integration: false     # Phase 3

# Metadata
metadata:
  created: "2026-03-19"
  last_updated: "2026-03-19"
  schema_version: "1.0.0"
