# AI Dev Extensions Core - Manifest
# This file defines the extension metadata and configuration references
#
# PURPOSE:
#   - Package-level metadata
#   - References to configuration files (references section)
#   - Used by setup scripts to locate configuration files
#
# WHO USES IT:
#   - Setup scripts - read configuration file references
#   - Package maintainers - update version and compatibility
#   - Microservice developers - see package information
#   - IDEs - may read metadata in future for automatic discovery
#
# WHEN TO EDIT:
#   - Package version bump → update 'version'
#   - Changing IDE support → update 'compatibility' section
#   - Adding new configuration files → update references

extension:
  name: "ai-dev-extensions-core"
  version: "0.1.0"
  description: "Reusable AI development workflows, templates, and rules for multiple IDEs"
  author: "Ornit Shaked"
  license: "MIT"
  
  # Repository information
  repository:
    type: "git"
    url: "https://github.com/ornit-shaked/ai-dev-extensions-core"
    bitbucket: "https://ilptltvbbp01.ecitele.com:8443/scm/~oshaked/ai-dev-extensions-core.git"


  # Configuration File References
  # See references section below for details about each file contains and when to use it
references:
  domain_config:
    file: "config/domain-mapping.yaml"
    purpose: "Defines available domains, their load order, and default enablement"
    contains: ["domain definitions", "priority settings", "enablement flags", "content types"]
    used_by: ["setup scripts", "domain management"]
    
  ide_config:
    file: "config/ide-mapping.yaml"
    purpose: "Maps domain content to IDE-specific directory structures"
    contains: ["IDE target directories", "content type mappings", "file patterns", "assets handling"]
    used_by: ["setup scripts", "IDE integration"]

# Metadata
metadata:
  created: "2026-03-19"
  last_updated: "2026-03-19"
  schema_version: "1.0.0"
