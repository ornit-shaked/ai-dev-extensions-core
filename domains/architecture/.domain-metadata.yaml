# Architecture Domain Metadata

domain:
  name: "architecture"
  display_name: "Architecture Documentation"
  description: "Workflows and templates for documenting microservice and library architecture"
  version: "1.0.0"
  
  # Default settings
  enabled_by_default: true
  priority: 1
  
  # Domain owner/maintainer
  owner:
    team: "Platform Engineering"
    contact: "platform@example.com"
  
  # What this domain provides
  provides:
    workflows:
      - id: "architecture-intake-create"
        file: "workflows/architecture-intake-create.md"
        description: "Extract and document architectural knowledge"
        
      - id: "architecture-intake-resolve"
        file: "workflows/architecture-intake-resolve.md"
        description: "Resolve open issues from architecture intake"
    
    templates:
      - id: "arch-intake-templates"
        path: "templates/"
        description: "Templates for architecture documentation sections"
    
    rules: []
    skills: []
  
  # Output structure (generated in microservice at docs/architecture/)
  output_structure:
    location: "docs/architecture/"
    
    sections:
      - id: "1-identity"
        name: "Identity & Boundaries"
        file: "1-identity.md"
        priority: "ESSENTIAL"
        typical_source: "SEMI"
        description: "Service purpose, responsibilities, ownership"
        contains:
          - "Service purpose and description"
          - "Responsibilities and capabilities"
          - "Non-goals (requires human input)"
          - "Team and ownership information"
          - "Integration points"
        use_when:
          - "Understanding service purpose and scope"
          - "Checking service boundaries"
          - "Finding ownership information"
          - "Before making architectural changes"
      
      - id: "2-architecture"
        name: "Architecture"
        file: "2-architecture.md"
        priority: "ESSENTIAL"
        typical_source: "AUTO"
        description: "Tech stack, components, design patterns"
        contains:
          - "Language, framework, versions"
          - "Dependencies (Spring Boot, MongoDB, etc.)"
          - "C4 Context and Container views"
          - "Design patterns and principles"
          - "Deployment information"
        use_when:
          - "Understanding internal structure"
          - "Checking frameworks and dependencies"
          - "Reviewing design patterns"
          - "Planning technical changes"
      
      - id: "3-contracts"
        name: "Contracts"
        file: "3-contracts.md"
        priority: "ESSENTIAL"
        typical_source: "SEMI"
        description: "APIs, events, and integrations"
        contains:
          - "REST endpoints (from controllers)"
          - "OpenAPI spec location"
          - "Async events (RabbitMQ/Kafka)"
          - "External service dependencies"
          - "Error response formats"
        use_when:
          - "Modifying or adding APIs"
          - "Understanding event contracts"
          - "Checking external integrations"
          - "Fixing integration issues"
      
      - id: "4-data"
        name: "Data Layer"
        file: "4-data.md"
        priority: "ESSENTIAL"
        typical_source: "AUTO"
        description: "Data model and persistence"
        contains:
          - "Database type and configuration"
          - "Entities and collections"
          - "Migrations (Flyway/Liquibase)"
          - "Data invariants and constraints"
          - "Repository methods"
        use_when:
          - "Understanding data model"
          - "Making database changes"
          - "Adding new entities"
          - "Reviewing data integrity"
      
      - id: "5-flows"
        name: "Key Flows"
        file: "5-flows.md"
        priority: "ESSENTIAL"
        typical_source: "SEMI"
        description: "Critical operational sequences"
        contains:
          - "3-5 key business flows"
          - "Flow triggers (endpoints/events)"
          - "Step-by-step sequences"
          - "Decision points"
          - "Error scenarios"
        use_when:
          - "Understanding business logic"
          - "Tracing end-to-end flows"
          - "Debugging flow issues"
          - "Adding new features"
      
      - id: "6-errors"
        name: "Error Handling"
        file: "6-errors.md"
        priority: "OPERATIONAL"
        typical_source: "AUTO"
        description: "Exception handling and error catalog"
        contains:
          - "Custom exception hierarchy"
          - "Error codes and meanings"
          - "HTTP status mappings"
          - "Recovery strategies"
          - "Logging patterns"
        use_when:
          - "Implementing error handling"
          - "Debugging errors"
          - "Adding new exceptions"
          - "Standardizing error responses"
      
      - id: "7-config"
        name: "Configuration"
        file: "7-config.md"
        priority: "ESSENTIAL"
        typical_source: "AUTO"
        description: "Configuration and local development"
        contains:
          - "Configuration file locations"
          - "Key parameters and defaults"
          - "Environment variables"
          - "Profiles (dev, k8s, prod)"
          - "Local setup instructions"
        use_when:
          - "Setting up local environment"
          - "Understanding configuration"
          - "Adding new config parameters"
          - "Troubleshooting env issues"
      
      - id: "8-observability"
        name: "Observability"
        file: "8-observability.md"
        priority: "OPERATIONAL"
        typical_source: "SEMI"
        description: "Logging, metrics, monitoring"
        contains:
          - "Logging framework and levels"
          - "Metrics endpoints"
          - "Health checks"
          - "Dashboard links (may need human)"
          - "Runbooks and alerts"
        use_when:
          - "Adding logging or metrics"
          - "Troubleshooting in production"
          - "Creating alerts"
          - "Reviewing operational health"
    
    metadata_files:
      - id: "_metadata"
        file: "_metadata.yaml"
        description: "Collection summary and completeness tracking"
        contains:
          - "Per-section metadata (source, completeness, risk)"
          - "Overall statistics"
          - "Security assessment"
          - "ADR status"
          - "Agent readiness level"
        use_when:
          - "Assessing documentation reliability"
          - "Checking completeness before agent use"
          - "Understanding collection quality"
      
      - id: "_open-issues"
        file: "_open-issues.md"
        description: "Items needing human review"
        contains:
          - "High/medium/low priority issues"
          - "Missing information"
          - "Items requiring business context"
          - "Review checklist"
        use_when:
          - "Identifying gaps in documentation"
          - "Planning follow-up work"
          - "Prioritizing manual updates"
  
  # Dependencies on other domains
  dependencies:
    - _core  # Requires core rules and skills
  
  # Target IDEs
  compatible_with:
    - windsurf
    - cursor  # Rules only
  
  # Documentation
  documentation:
    guide: "../../docs/domains/architecture.md"
    examples: "../../examples/architecture/"
  
  # Metadata
  created: "2026-03-19"
  last_updated: "2026-03-19"
  schema_version: "1.0.0"
